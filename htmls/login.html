<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Nana Forex</title>
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/auth.css" />

    <!-- Supabase SDK + client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/env.js"></script>
    <script src="../js/supabase-client.js"></script>
  </head>

  <body>
    <!-- NAVIGATION -->
    <header class="navbar">
      <div class="logo" style="font-weight: 900"><a href="/" class="logo-link"><img src="/images/logo.jpg" alt="Nana Forex" class="logo-img" /><span>NanaForex</span></a></div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="dashboard.html">Performance</a>
        <a href="blog.html">Blogs</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </header>

    <div class="menu-overlay"></div>
    <div class="mobile-menu">
      <button class="mobile-menu-close" aria-label="Close menu">
        <i class="fas fa-times"></i>
      </button>
      <div class="mobile-menu-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="dashboard.html">Performance</a>
        <a href="blog.html">Blogs</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>

    <!-- LOGIN CARD -->
    <main class="auth-wrap">
      <div class="auth-card">
        <h1>Welcome <span class="gold-text">back</span></h1>
        <p class="auth-sub">Log in to your Nana Forex account.</p>

        <form class="auth-form" id="loginForm" novalidate>
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input
              type="email"
              id="loginEmail"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="pw-wrap">
              <input
                type="password"
                id="loginPassword"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
              <button type="button" class="pw-toggle" aria-label="Show password">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="auth-meta">
            <a href="reset-password.html">Forgot password?</a>
          </div>

          <button type="submit" id="loginBtn">Log In</button>
          <p id="loginStatus" class="auth-status"></p>
        </form>

        <p class="auth-alt">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
      </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
