<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Nana Forex</title>
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/auth.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/env.js"></script>
    <script src="../js/supabase-client.js"></script>
  </head>

  <body>
    <header class="navbar">
      <div class="logo" style="font-weight: 900"><a href="/" class="logo-link"><img src="/images/logo.jpg" alt="Nana Forex" class="logo-img" /><span>NanaForex</span></a></div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="dashboard.html">Performance</a>
        <a href="blog.html">Blogs</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="hamburger"><span></span><span></span><span></span></div>
    </header>

    <div class="menu-overlay"></div>
    <div class="mobile-menu">
      <button class="mobile-menu-close" aria-label="Close menu">
        <i class="fas fa-times"></i>
      </button>
      <div class="mobile-menu-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="dashboard.html">Performance</a>
        <a href="blog.html">Blogs</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>

    <main class="auth-wrap">
      <div class="auth-card">
        <h1>Reset <span class="gold-text">password</span></h1>
        <p class="auth-sub">
          Enter your email and we'll send you a link to reset your password.
        </p>

        <form class="auth-form" id="resetForm" novalidate>
          <div class="form-group">
            <label for="resetEmail">Email Address</label>
            <input type="email" id="resetEmail" autocomplete="email" placeholder="you@example.com" required />
          </div>

          <button type="submit" id="resetBtn">Send Reset Link</button>
          <p id="resetStatus" class="auth-status"></p>
        </form>

        <p class="auth-alt">
          Remembered it? <a href="login.html">Back to login</a>
        </p>
      </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
